<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JanSetu — My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="../assets/js/api.js"></script>
<style>
  :root {
    --navy: #0f1f3d; --navy-light: #1a3260; --saffron: #f4880a;
    --saffron-light: #ffa63d; --white: #f8f6f1; --muted: #8a9ab5;
    --card-bg: #162040; --border: rgba(244,136,10,0.18);
    --sidebar-w: 240px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; display: flex; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); background: var(--card-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
  }
  .sidebar-brand {
    padding: 1.5rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .6rem;
  }
  .brand-icon { width: 36px; height: 36px; background: var(--saffron); border-radius: 8px; display: grid; place-items: center; font-size: 1.1rem; }
  .brand-name { font-family: 'Crimson Pro', serif; font-size: 1.3rem; font-weight: 700; }
  .brand-name span { color: var(--saffron); }
  .sidebar-nav { padding: 1rem .75rem; flex: 1; }
  .nav-label { font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: .5rem .6rem .3rem; }
  .nav-item {
    display: flex; align-items: center; gap: .7rem;
    padding: .65rem .75rem; border-radius: 8px;
    color: var(--muted); font-size: .88rem; font-weight: 500;
    text-decoration: none; transition: all .2s; margin-bottom: .15rem;
    cursor: pointer; border: none; background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(244,136,10,0.08); color: var(--white); }
  .nav-item.active { background: rgba(244,136,10,0.15); color: var(--saffron); }
  .nav-item .icon { width: 20px; text-align: center; font-size: 1rem; }
  .sidebar-footer {
    padding: 1rem .75rem;
    border-top: 1px solid var(--border);
  }
  .user-chip {
    display: flex; align-items: center; gap: .6rem;
    padding: .6rem .75rem; border-radius: 8px;
    background: rgba(255,255,255,0.04);
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--saffron); display: grid; place-items: center;
    font-weight: 700; font-size: .85rem; color: var(--navy); flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: .82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: .72rem; color: var(--muted); }
  .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0; transition: color .2s; }
  .logout-btn:hover { color: #e05252; }

  /* Main */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15,31,61,0.8); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 40;
  }
  .topbar-title h1 { font-family: 'Crimson Pro', serif; font-size: 1.5rem; font-weight: 700; }
  .topbar-title p { color: var(--muted); font-size: .82rem; margin-top: .15rem; }
  .btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .55rem 1.2rem; border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: .875rem; font-weight: 600;
    cursor: pointer; transition: all .2s; text-decoration: none; border: none;
  }
  .btn-primary { background: var(--saffron); color: var(--navy); }
  .btn-primary:hover { background: var(--saffron-light); transform: translateY(-1px); }

  .content { padding: 2rem; flex: 1; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.4rem 1.5rem;
  }
  .stat-label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
  .stat-value { font-family: 'Crimson Pro', serif; font-size: 2.2rem; font-weight: 700; color: var(--white); line-height: 1; }
  .stat-sub { font-size: .78rem; color: var(--muted); margin-top: .3rem; }

  /* Complaints list */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .section-header h2 { font-family: 'Crimson Pro', serif; font-size: 1.3rem; font-weight: 700; }

  .complaints-list { display: flex; flex-direction: column; gap: .85rem; }
  .complaint-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem 1.5rem; transition: border-color .2s;
    display: flex; align-items: flex-start; gap: 1rem;
  }
  .complaint-card:hover { border-color: rgba(244,136,10,0.45); }
  .complaint-id {
    min-width: 42px; height: 42px; border-radius: 8px;
    background: rgba(244,136,10,0.1); display: grid; place-items: center;
    font-family: 'Crimson Pro', serif; font-size: 1.1rem; font-weight: 700; color: var(--saffron);
    flex-shrink: 0;
  }
  .complaint-body { flex: 1; }
  .complaint-title { font-weight: 600; font-size: .95rem; margin-bottom: .3rem; }
  .complaint-meta { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
  .complaint-desc { color: var(--muted); font-size: .83rem; margin-bottom: .5rem; line-height: 1.5; }
  .badge {
    display: inline-block; padding: .22rem .7rem; border-radius: 4px;
    font-size: .73rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
  }
  .badge-pending { background: rgba(244,136,10,0.15); color: var(--saffron); }
  .badge-progress { background: rgba(61,130,220,0.15); color: #5ba8f5; }
  .badge-resolved { background: rgba(61,187,123,0.15); color: #3dbb7b; }
  .badge-dept { background: rgba(255,255,255,0.06); color: var(--muted); }
  .meta-text { color: var(--muted); font-size: .78rem; }

  .empty-state {
    text-align: center; padding: 4rem 2rem;
    background: var(--card-bg); border: 1px dashed var(--border); border-radius: 12px;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: .5; }
  .empty-state h3 { font-family: 'Crimson Pro', serif; font-size: 1.3rem; margin-bottom: .5rem; }
  .empty-state p { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }

  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--saffron); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: .75rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🏛️</div>
    <span class="brand-name">Jan<span>Setu</span></span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Menu</div>
    <a class="nav-item active" onclick="showSection('dashboard')">
      <span class="icon">🏠</span> Dashboard
    </a>
    <a class="nav-item" onclick="showSection('complaints')">
      <span class="icon">📋</span> My Complaints
    </a>
    <a class="nav-item" href="add_complaint.html">
      <span class="icon">➕</span> File Complaint
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">Loading...</div>
        <div class="user-role">Citizen</div>
      </div>
      <button class="logout-btn" onclick="logoutUser()" title="Logout">⇒</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-title">
      <h1 id="pageTitle">Dashboard</h1>
      <p id="pageSubtitle">Welcome back, <span id="topbarName">Citizen</span></p>
    </div>
    <a href="add_complaint.html" class="btn btn-primary">+ File Complaint</a>
  </div>

  <div class="content">
    <!-- Dashboard Section -->
    <div id="dashboardSection">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Filed</div>
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div class="stat-value" id="statPending">—</div>
          <div class="stat-sub">Awaiting action</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="statProgress">—</div>
          <div class="stat-sub">Being worked on</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Resolved</div>
          <div class="stat-value" id="statResolved">—</div>
          <div class="stat-sub">Closed successfully</div>
        </div>
      </div>

      <div class="section-header">
        <h2>Recent Complaints</h2>
        <a href="add_complaint.html" class="btn btn-primary" style="padding:.45rem 1rem;font-size:.82rem;">+ New</a>
      </div>
      <div id="recentComplaints">
        <div class="loading"><div class="spinner"></div><br/>Loading your complaints...</div>
      </div>
    </div>
  </div>
</main>

<script>
// Auth guard
const userName = localStorage.getItem('user_name');
const userRole = localStorage.getItem('user_role');
const token = localStorage.getItem('access_token');

if (!token) { window.location.href = 'login.html'; }
if (userRole === 'admin') { window.location.href = '../admin/dashboard.html'; }

// Set user info
if (userName) {
  document.getElementById('sidebarName').textContent = userName;
  document.getElementById('topbarName').textContent = userName.split(' ')[0];
  document.getElementById('avatarInitial').textContent = userName.charAt(0).toUpperCase();
}

function showSection(s) {
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && s === 'dashboard') || (i === 1 && s === 'complaints'));
  });
}

function getStatusBadge(status) {
  const map = {
    'Pending': 'badge-pending',
    'In Progress': 'badge-progress',
    'Resolved': 'badge-resolved'
  };
  return `<span class="badge ${map[status] || 'badge-pending'}">${status}</span>`;
}

async function loadComplaints() {
  try {
    const complaints = await apiRequest('/complaints/my', 'GET');
    renderComplaints(complaints, 'recentComplaints', true);
    updateStats(complaints);
  } catch (err) {
    // API may not have /complaints/my yet — show prompt
    document.getElementById('recentComplaints').innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>No complaints yet</h3>
        <p>Your filed complaints will appear here once the listing endpoint is connected.</p>
        <a href="add_complaint.html" class="btn btn-primary">File Your First Complaint</a>
      </div>`;
    document.getElementById('statTotal').textContent = '0';
    document.getElementById('statPending').textContent = '0';
    document.getElementById('statProgress').textContent = '0';
    document.getElementById('statResolved').textContent = '0';
  }
}

function updateStats(complaints) {
  document.getElementById('statTotal').textContent = complaints.length;
  document.getElementById('statPending').textContent = complaints.filter(c => c.status === 'Pending').length;
  document.getElementById('statProgress').textContent = complaints.filter(c => c.status === 'In Progress').length;
  document.getElementById('statResolved').textContent = complaints.filter(c => c.status === 'Resolved').length;
}

function renderComplaints(complaints, containerId, limit) {
  const container = document.getElementById(containerId);
  const list = limit ? complaints.slice(0, 5) : complaints;
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>No complaints filed</h3>
        <p>File your first complaint to get started.</p>
        <a href="add_complaint.html" class="btn btn-primary">File a Complaint</a>
      </div>`;
    return;
  }
  container.innerHTML = `<div class="complaints-list">${list.map(c => `
    <div class="complaint-card">
      <div class="complaint-id">#${c.id}</div>
      <div class="complaint-body">
        <div class="complaint-title">${c.title}</div>
        <div class="complaint-desc">${(c.description || '').substring(0, 100)}${c.description?.length > 100 ? '...' : ''}</div>
        <div class="complaint-meta">
          ${getStatusBadge(c.status)}
          ${c.department ? `<span class="badge badge-dept">${c.department}</span>` : ''}
          ${c.urgency ? `<span class="meta-text">Urgency: ${c.urgency}</span>` : ''}
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

loadComplaints();
</script>
</body>
</html>
