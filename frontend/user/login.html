<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JanSetu — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="../assets/js/api.js"></script>
<style>
  :root {
    --navy: #0f1f3d; --navy-light: #1a3260; --saffron: #f4880a;
    --saffron-light: #ffa63d; --white: #f8f6f1; --muted: #8a9ab5;
    --card-bg: #162040; --border: rgba(244,136,10,0.2);
    --input-bg: #0d1b35; --error: #e05252; --success: #3dbb7b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy); color: var(--white);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 50%, rgba(244,136,10,0.07) 0%, transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(26,50,96,0.5) 0%, transparent 45%);
    pointer-events: none;
  }
  .container { position: relative; z-index: 1; width: 100%; max-width: 440px; }

  .back-link {
    display: inline-flex; align-items: center; gap: .4rem;
    color: var(--muted); text-decoration: none; font-size: .85rem;
    margin-bottom: 2rem; transition: color .2s;
  }
  .back-link:hover { color: var(--saffron); }

  .brand { display: flex; align-items: center; gap: .75rem; margin-bottom: 2rem; }
  .brand-icon {
    width: 44px; height: 44px; background: var(--saffron);
    border-radius: 10px; display: grid; place-items: center; font-size: 1.3rem;
  }
  .brand-name { font-family: 'Crimson Pro', serif; font-size: 1.6rem; font-weight: 700; }
  .brand-name span { color: var(--saffron); }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 2.25rem;
  }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 2rem; background: var(--input-bg); border-radius: 8px; padding: 4px; }
  .tab {
    flex: 1; padding: .55rem; border-radius: 6px;
    text-align: center; font-size: .88rem; font-weight: 600;
    cursor: pointer; transition: all .2s; color: var(--muted);
    border: none; background: transparent;
  }
  .tab.active { background: var(--saffron); color: var(--navy); }

  .form-section { display: none; }
  .form-section.active { display: block; }

  h2 { font-family: 'Crimson Pro', serif; font-size: 1.7rem; font-weight: 700; margin-bottom: .4rem; }
  .subtitle { color: var(--muted); font-size: .88rem; margin-bottom: 1.75rem; line-height: 1.5; }

  .field { margin-bottom: 1.1rem; }
  label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; letter-spacing: .04em; text-transform: uppercase; }
  input {
    width: 100%; padding: .7rem .95rem;
    background: var(--input-bg); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 8px; color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: .95rem;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  input:focus { border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(244,136,10,0.12); }
  input::placeholder { color: rgba(138,154,181,0.5); }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .btn-submit {
    width: 100%; padding: .8rem;
    background: var(--saffron); color: var(--navy);
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: all .2s; margin-top: .5rem;
  }
  .btn-submit:hover { background: var(--saffron-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(244,136,10,0.3); }
  .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .alert {
    padding: .75rem 1rem; border-radius: 8px; font-size: .875rem;
    margin-bottom: 1rem; display: none;
  }
  .alert.error { background: rgba(224,82,82,0.12); border: 1px solid rgba(224,82,82,0.3); color: #f08080; }
  .alert.success { background: rgba(61,187,123,0.12); border: 1px solid rgba(61,187,123,0.3); color: #3dbb7b; }
  .alert.show { display: block; }

  .divider { text-align: center; color: var(--muted); font-size: .82rem; margin: 1.25rem 0; position: relative; }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%; width: calc(50% - 2rem);
    height: 1px; background: rgba(255,255,255,0.08);
  }
  .divider::before { left: 0; } .divider::after { right: 0; }

  .toggle-link { text-align: center; font-size: .85rem; color: var(--muted); margin-top: 1.25rem; }
  .toggle-link a { color: var(--saffron); text-decoration: none; font-weight: 600; }
  .toggle-link a:hover { text-decoration: underline; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--navy); border-top-color: transparent;
    border-radius: 50%; animation: spin .7s linear infinite; margin-right: .4rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <a href="../index.html" class="back-link">← Back to Home</a>

  <div class="brand">
    <div class="brand-icon">🏛️</div>
    <span class="brand-name">Jan<span>Setu</span></span>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="loginSection">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your citizen account to file and track complaints.</p>
      <div class="alert error" id="loginError"></div>
      <div class="alert success" id="loginSuccess"></div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Sign In</button>
      <div class="toggle-link">New here? <a href="#" onclick="switchTab('signup')">Create an account</a></div>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-section" id="signupSection">
      <h2>Create account</h2>
      <p class="subtitle">Join JanSetu to file complaints and track government response.</p>
      <div class="alert error" id="signupError"></div>
      <div class="alert success" id="signupSuccess"></div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name"/>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Choose a strong password"/>
      </div>
      <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create Account</button>
      <div class="toggle-link">Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a></div>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
  });
  document.getElementById('loginSection').classList.toggle('active', tab === 'login');
  document.getElementById('signupSection').classList.toggle('active', tab === 'signup');
}

function showAlert(id, msg, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert ${type} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

function setLoading(btn, loading, text) {
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>Processing...` : text;
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) return showAlert('loginError', 'Please fill in all fields.');

  setLoading(btn, true, 'Sign In');
  try {
    const result = await loginUser({ email, password });
    showAlert('loginSuccess', 'Login successful! Redirecting...', 'success');
    setTimeout(() => {
      window.location.href = result.user.role === 'admin'
        ? '../admin/dashboard.html'
        : 'dashboard.html';
    }, 800);
  } catch (err) {
    showAlert('loginError', err.message || 'Login failed. Check your credentials.');
  } finally {
    setLoading(btn, false, 'Sign In');
  }
}

async function handleSignup() {
  const full_name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const btn = document.getElementById('signupBtn');

  if (!full_name || !email || !password) return showAlert('signupError', 'Please fill in all fields.');
  if (password.length < 6) return showAlert('signupError', 'Password must be at least 6 characters.');

  setLoading(btn, true, 'Create Account');
  try {
    await registerUser({ full_name, email, password });
    showAlert('signupSuccess', 'Account created! Please login.', 'success');
    setTimeout(() => switchTab('login'), 1200);
  } catch (err) {
    showAlert('signupError', err.message || 'Registration failed. Email may already be in use.');
  } finally {
    setLoading(btn, false, 'Create Account');
  }
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('loginSection').classList.contains('active')) handleLogin();
  else handleSignup();
});
</script>
</body>
</html>
